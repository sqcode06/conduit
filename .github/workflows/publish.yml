name: Publish CLI

# Publishes the exact tested @sqcode/conduit tarball when a GitHub Release is published.
# The first release uses a short-lived granular NPM_TOKEN with publish permission and
# 2FA bypass to bootstrap the package. Migrate to npm trusted publishing immediately
# afterward, remove the secret, and revoke the token.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify and publish npm tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci --engine-strict
      - run: npm ci --engine-strict --prefix cli
      - run: cp wrangler.example.jsonc wrangler.jsonc
      - run: npx wrangler types
      - name: Build and test the release tarball
        run: npm run release:check -- --artifact-dir "$RUNNER_TEMP/conduit-release"
      - name: Publish the tested tarball
        run: npm publish "$RUNNER_TEMP"/conduit-release/*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
