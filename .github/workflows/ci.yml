name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  worker:
    name: Worker — typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --engine-strict
      # Real wrangler.jsonc is gitignored; build it from the template + generate types.
      - run: cp wrangler.example.jsonc wrangler.jsonc
      - run: npx wrangler types
      - run: npm run typecheck
      - run: npm test

  cli:
    name: CLI — typecheck + tests + build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci --engine-strict
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Pack and install the real artifact
        run: |
          mkdir -p "$RUNNER_TEMP/conduit-pack" "$RUNNER_TEMP/conduit-install"
          npm pack --ignore-scripts --pack-destination "$RUNNER_TEMP/conduit-pack"
          npm install --engine-strict --ignore-scripts --no-audit --no-fund \
            --prefix "$RUNNER_TEMP/conduit-install" "$RUNNER_TEMP"/conduit-pack/*.tgz
          test "$("$RUNNER_TEMP/conduit-install/node_modules/.bin/conduit" --version)" = \
            "$(node -p "require('./package.json').version")"
          "$RUNNER_TEMP/conduit-install/node_modules/.bin/conduit" --help

  release-gate:
    name: Release gate — packed CLI ↔ local Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cli/package-lock.json
      - run: npm ci --engine-strict
      - run: npm ci --engine-strict --prefix cli
      - run: cp wrangler.example.jsonc wrangler.jsonc
      - run: npx wrangler types
      - run: npm run release:check
